modLoader     = "javafml"
loaderVersion = "[4,)"
license       = "${mod_license}"

issueTrackerURL = "https://github.com/chillestorange/worldsync/issues"

[[mods]]
modId       = "${mod_id}"
version     = "${mod_version}"
displayName = "${mod_name}"
description = '''${mod_description}'''
logoFile    = "assets/${mod_id}/icon.png"
displayURL  = "https://github.com/chillestorange/worldsync"
authors     = "${mod_authors}"

[[dependencies.${mod_id}]]
modId        = "neoforge"
type         = "required"
versionRange = "[${neoforge_version},)"
ordering     = "NONE"
side         = "BOTH"

[[dependencies.${mod_id}]]
modId        = "minecraft"
type         = "required"
versionRange = "[${minecraft_version},)"
ordering     = "NONE"
side         = "BOTH"

[[mixins]]
config = "${mod_id}.mixins.json"
